<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视搜索首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: sans-serif;
            background-color: #f7f8fa;
            padding-top: 120px; /* 整体向上偏移，不再垂直居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title {
            font-size: 36px;
            color: #222;
            margin-bottom: 40px;
        }
        .search-wrap {
            display: flex;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }
        #search-input {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            font-size: 16px;
            border: 1px solid #dcdcdc;
            border-radius: 6px 0 0 6px;
            outline: none;
        }
        #search-input:focus {
            border-color: #165DFF;
        }
        #search-btn {
            height: 48px;
            padding: 0 28px;
            background-color: #165DFF;
            color: white;
            border: none;
            border-radius: 0 6px 6px 0;
            font-size: 16px;
            cursor: pointer;
        }
        #search-btn:hover {
            background-color: #0f4cdb;
        }
    </style>
</head>
<body>
    <h1 class="title">影视资源搜索</h1>

    <div class="search-wrap">
        <input type="text" id="search-input" placeholder="输入电影、动漫、电视剧名称">
        <button id="search-btn">搜索</button>
    </div>
</body>
</html>
