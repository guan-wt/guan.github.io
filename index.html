<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视资源搜索首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: sans-serif;
            background-color: #f7f8fa;
            padding-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title {
            font-size: 36px;
            color: #222;
            margin-bottom: 40px;
        }
        .search-wrap {
            display: flex;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            margin-bottom: 50px;
        }
        #search-input {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            font-size: 16px;
            border: 1px solid #dcdcdc;
            border-radius: 6px 0 0 6px;
            outline: none;
        }
        #search-input:focus {
            border-color: #165DFF;
        }
        #search-btn {
            height: 48px;
            padding: 0 28px;
            background-color: #165DFF;
            color: white;
            border: none;
            border-radius: 0 6px 6px 0;
            font-size: 16px;
            cursor: pointer;
        }
        #search-btn:hover {
            background-color: #0f4cdb;
        }
        .result-box {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }
        .result-item {
            background: #fff;
            padding: 18px 22px;
            border-radius: 8px;
            margin-bottom: 14px;
            box-shadow: 0 1px 6px #e5e7eb;
        }
        .result-name {
            font-size: 20px;
            color: #111;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .line {
            font-size: 14px;
            color: #555;
            margin: 4px 0;
        }
        .quark-link {
            color: #165DFF;
            word-break: break-all;
        }
        .empty-tip {
            color: #999;
            font-size: 16px;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <h1 class="title">影视资源搜索</h1>
    <div class="search-wrap">
        <input type="text" id="search-input" placeholder="输入名称、标签搜索">
        <button id="search-btn">搜索</button>
    </div>
    <div class="result-box" id="resultWrap"></div>

    <script>
        let filmData = [];
        const input = document.getElementById('search-input');
        const btn = document.getElementById('search-btn');
        const resultWrap = document.getElementById('resultWrap');

        async function loadData() {
            try {
                const res = await fetch("./data.json");
                filmData = await res.json();
            } catch (err) {
                resultWrap.innerHTML = `<div class="empty-tip">数据加载失败，请等待Actions执行完成</div>`;
            }
        }

        function searchFilm() {
            const keyword = input.value.trim().toLowerCase();
            resultWrap.innerHTML = "";
            if (!keyword) {
                resultWrap.innerHTML = `<div class="empty-tip">请输入关键词搜索</div>`;
                return;
            }
            // 匹配名称+标签
            const filterList = filmData.filter(item => {
                const name = String(item.name).toLowerCase();
                const tag = String(item.tag).toLowerCase();
                return name.includes(keyword) || tag.includes(keyword);
            });
            if (filterList.length === 0) {
                resultWrap.innerHTML = `<div class="empty-tip">未找到相关影视</div>`;
                return;
            }
            filterList.forEach(item => {
                const div = document.createElement('div');
                div.className = "result-item";
                div.innerHTML = `
                    <div class="result-name">${item.name}</div>
                    <div class="line">年份：${item.year} | 类型：${item.type}</div>
                    <div class="line">清晰度：${item.clear} | 大小：${item.size}</div>
                    <div class="line">字幕：${item.sub}</div>
                    <div class="line">标签：${item.tag}</div>
                    <div class="line">夸克链接：<span class="quark-link">${item.quark}</span></div>
                `;
                resultWrap.appendChild(div);
            });
        }
        btn.addEventListener('click', searchFilm);
        input.addEventListener('keydown', e => e.key === 'Enter' && searchFilm());
        loadData();
    </script>
</body>
</html>
