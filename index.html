<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视资源导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: #f0f2f5;
        }
        /* 导航栏样式 */
        nav {
            background: #165DFF;
        }
        .nav-box {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
        }
        .nav-box a {
            color: #fff;
            text-decoration: none;
            padding: 18px 26px;
            font-size: 17px;
            display: block;
            transition: background 0.2s;
        }
        .nav-box a:hover {
            background: #0E4BDB;
        }
        /* 内容区域 */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #ddd;
        }
        h1 {
            color: #222;
            margin-bottom: 15px;
        }
        p {
            color: #555;
            line-height: 1.7;
            font-size: 16px;
        }
        /* 手机适配：导航竖排 */
        @media (max-width: 600px) {
            .nav-box {
                flex-direction: column;
            }
            .nav-box a {
                text-align: center;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-box">
            <a href="#movie">电影</a>
            <a href="#anime">动漫</a>
            <a href="#tv">电视剧</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>影视资源导航主页</h1>
            <p>上方导航栏可快速跳转对应分类资源，手机、电脑均可正常浏览。</p>

            <br>
            <h2 id="movie">🎬 电影专区</h2>
            <p>各类院线大片、经典老片、高分电影资源汇总</p>

            <br>
            <h2 id="anime">🎌 动漫专区</h2>
            <p>新番连载、完结番剧、国漫、经典动画合集</p>

            <br>
            <h2 id="tv">📺 电视剧专区</h2>
            <p>国产剧、韩剧、美剧、日剧、港台剧集</p>
        </div>
    </div>
</body>
</html>
