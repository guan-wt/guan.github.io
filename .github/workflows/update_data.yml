name: 更新飞书多维表格数据
on:
  # 每6小时自动更新一次
  schedule:
    - cron: "0 */6 * * *"
  # 支持手动点击运行
  workflow_dispatch:

jobs:
  run-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行Python脚本拉取飞书数据
        env:
          APP_ID: ${{ secrets.FEISHU_APP_ID }}
          APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          BITABLE_TABLE_ID: ${{ secrets.BITABLE_TABLE_ID }}
        run: python fetch_bitable.py

      - name: 提交更新后的data.json
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新多维表格数据"
          git push
